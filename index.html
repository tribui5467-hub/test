<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Midnight Gold Chess Engine</title>
    <script src='https://cloudflare.com'></script>
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --panel: #1a1a1a;
            --gold: #d4af37;
            --white-piece: #ffffff;
            --black-piece: #ff4d4d; /* High visibility red/black hybrid */
            --sq-light: #2c2c2c;
            --sq-dark: #121212;
            --accent: #96bc4b;
        }

        body {
            background-color: var(--bg-deep);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            display: flex;
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 8px solid #000;
            position: relative;
        }

        .square {
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .light { background: var(--sq-light); }
        .dark { background: var(--sq-dark); }

        .piece {
            font-size: 55px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            user-select: none;
        }

        /* Fixed Visibility: Outline for pieces on same-color squares */
        .w-piece { color: var(--white-piece); text-shadow: 0 0 10px rgba(0,0,0,1); }
        .b-piece { color: var(--black-piece); text-shadow: 0 0 10px rgba(0,0,0,1); }

        .eval-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
            animation: expand 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes expand { from { transform: scale(0); } to { transform: scale(1); } }

        .best { background: #96bc4b; color: white; } /* Chess.com Star */
        .blunder { background: #fa412d; color: white; } /* Chess.com ?? */

        #controls {
            margin-left: 40px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        select, button {
            padding: 12px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="board"></div>
    <div id="controls">
        <h2 style="color: var(--gold); margin-top:0;">Abyssal Chess</h2>
        <label>AI Tier:</label>
        <select id="difficulty">
            <option value="1">Tier 1: Novice</option>
            <option value="2">Tier 2: Intermediate</option>
            <option value="3" selected>Tier 3: Advanced (Sacrifice Logic)</option>
        </select>
        <div id="status">White's Turn</div>
        <button onclick="newGame()">Reset Board</button>
    </div>
</div>

<script>
    const game = new Chess();
    const boardEl = document.getElementById('board');
    const piecesMap = {'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'P': '♟', 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚'};

    let selectedSq = null;

    function init() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const r = Math.floor(i / 8), c = i % 8;
            const pos = String.fromCharCode(97 + c) + (8 - r);
            const sq = document.createElement('div');
            sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            sq.dataset.pos = pos;
            sq.onclick = () => handleSquareClick(pos);
            boardEl.appendChild(sq);
        }
        render();
    }

    function render() {
        document.querySelectorAll('.square').forEach(sq => {
            const p = game.get(sq.dataset.pos);
            sq.innerHTML = '';
            if (p) {
                const div = document.createElement('div');
                div.className = `piece ${p.color === 'w' ? 'w-piece' : 'b-piece'}`;
                div.innerText = piecesMap[p.type.toUpperCase()];
                sq.appendChild(div);
            }
        });
        document.getElementById('status').innerText = game.turn() === 'w' ? "White to move" : "AI is thinking...";
    }

    function handleSquareClick(pos) {
        if (game.turn() !== 'w') return;
        if (selectedSq === pos) { selectedSq = null; return; }

        const move = game.move({ from: selectedSq, to: pos, promotion: 'q' });
        if (move) {
            selectedSq = null;
            render();
            showEval(pos, move);
            setTimeout(aiTurn, 500);
        } else {
            const p = game.get(pos);
            if (p && p.color === 'w') selectedSq = pos;
        }
    }

    // --- AI LOGIC (MINIMAX + PIECE VALUES) ---
    const values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

    function evaluateBoard(g) {
        let total = 0;
        g.board().forEach(row => {
            row.forEach(p => {
                if (p) total += (p.color === 'w' ? -values[p.type] : values[p.type]);
            });
        });
        return total;
    }

    function minimax(g, depth, isMax, alpha, beta) {
        if (depth === 0) return evaluateBoard(g);
        const moves = g.moves();
        if (isMax) {
            let best = -9999;
            for (let m of moves) {
                g.move(m);
                best = Math.max(best, minimax(g, depth - 1, !isMax, alpha, beta));
                g.undo();
                alpha = Math.max(alpha, best);
                if (beta <= alpha) break;
            }
            return best;
        } else {
            let best = 9999;
            for (let m of moves) {
                g.move(m);
                best = Math.min(best, minimax(g, depth - 1, !isMax, alpha, beta));
                g.undo();
                beta = Math.min(beta, best);
                if (beta <= alpha) break;
            }
            return best;
        }
    }

    function aiTurn() {
        if (game.game_over()) return;
        const depth = parseInt(document.getElementById('difficulty').value);
        let moves = game.moves();
        let bestMove = null;
        let bestVal = -9999;

        moves.forEach(m => {
            game.move(m);
            let val = minimax(game, depth - 1, false, -10000, 10000);
            game.undo();
            if (val > bestVal) { bestVal = val; bestMove = m; }
        });

        const mObj = game.move(bestMove);
        render();
        showEval(mObj.to, mObj);
    }

    function showEval(pos, move) {
        const sq = document.querySelector(`[data-pos='${pos}']`);
        const icon = document.createElement('div');
        icon.className = 'eval-icon ' + (move.captured ? 'best' : 'best'); 
        icon.innerText = move.captured ? '!!' : '★';
        sq.appendChild(icon);
        setTimeout(() => icon.remove(), 2000);
    }

    function newGame() { game.reset(); init(); }
    init();
</script>
</body>
</html>
